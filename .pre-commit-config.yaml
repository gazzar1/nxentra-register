repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # A93: migration health gate — block pushes that diverge models from migrations.
  # Runs on `git push`, not every commit, so it doesn't slow the inner-loop.
  # The full "migrate from zero" check is in scripts/migrations-fresh-migrate.ps1
  # (and .sh) — devs are expected to run that one manually before non-trivial
  # schema work lands.
  - repo: local
    hooks:
      - id: django-makemigrations-check
        name: django makemigrations --check (no missing migrations)
        entry: python backend/manage.py makemigrations --check --dry-run
        language: system
        pass_filenames: false
        stages: [pre-push]

  # A97: mypy gate on the canonical spine. Strict typing is already configured
  # per-module in backend/pyproject.toml (check_untyped_defs + warn_return_any);
  # this hook makes it BLOCKING on push. The script changes to backend/ first
  # so django_stubs can import nxentra_backend.settings. --follow-imports=silent
  # so transitively-imported files get type-checked for inference but their
  # existing errors (sales/commands.py + accounting/commands.py ≈235 errors,
  # tracked as A98) don't block the gate.
  - repo: local
    hooks:
      - id: mypy-spine
        name: mypy strict on canonical spine
        entry: python scripts/check-types.py
        language: system
        pass_filenames: false
        stages: [pre-push]
