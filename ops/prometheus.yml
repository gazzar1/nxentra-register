# Prometheus configuration for Nxentra
#
# Scrapes metrics from the Django backend and evaluates alert rules.
# Alert rules are in ops/alert-rules.yml.
# Alertmanager config is in ops/alertmanager.yml.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: "nxentra-backend"
    metrics_path: "/_metrics/"
    static_configs:
      - targets: ["backend:8000"]
    scrape_interval: 10s
