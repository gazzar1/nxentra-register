name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ─────────────────────────────────────────────────────────
  # Backend: unit + integration tests on SQLite (fast)
  # ─────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (SQLite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: nxentra_backend.test_settings
          TESTING: "True"
        run: |
          python -m pytest tests/ accounting/tests/ events/tests/ accounts/tests/ \
            -v --tb=short -x \
            --ignore=tests/e2e/

  # ─────────────────────────────────────────────────────────
  # Backend: e2e tests on PostgreSQL (full fidelity)
  # ─────────────────────────────────────────────────────────
  backend-e2e:
    name: Backend E2E Tests (Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nxentra_test
          POSTGRES_PASSWORD: nxentra_test
          POSTGRES_DB: nxentra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run e2e tests
        env:
          DJANGO_SETTINGS_MODULE: nxentra_backend.test_settings
          TEST_DATABASE_URL: postgres://nxentra_test:nxentra_test@localhost:5432/nxentra_test
          TESTING: "True"
        run: |
          python -m pytest tests/e2e/ \
            -v --tb=short -x \
            --create-db

  # ─────────────────────────────────────────────────────────
  # Frontend: test + build
  # ─────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────
  # Backend: lint + type check (ruff + mypy)
  # ─────────────────────────────────────────────────────────
  backend-lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check

      - name: Ruff format check
        run: ruff format --check --diff

      - name: mypy type check
        run: mypy --config-file pyproject.toml .
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # Security: deploy checks + dependency audit
  # ─────────────────────────────────────────────────────────
  security-check:
    name: Security & Deploy Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci
        working-directory: frontend

      - name: Django deploy check (0 warnings required)
        env:
          DEBUG: "False"
          SECRET_KEY: "ci-only-secret-key-that-is-long-enough-for-django-security-check-W009"
          ALLOWED_HOSTS: "ci.nxentra.com"
          CORS_ALLOWED_ORIGINS: "https://ci.nxentra.com"
          CSRF_TRUSTED_ORIGINS: "https://ci.nxentra.com"
        run: python manage.py check --deploy --fail-level WARNING

      - name: Django migration check (no pending migrations)
        run: python manage.py migrate --check --no-input
        env:
          DATABASE_URL: "sqlite:///ci_check.sqlite3"

      - name: npm audit (production dependencies)
        run: npm audit --production --audit-level=high
        working-directory: frontend

  # ─────────────────────────────────────────────────────────
  # Quality gate: all checks must pass to merge
  # ─────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    needs: [backend-tests, backend-e2e, frontend-build, backend-lint, security-check]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "All quality gates passed"
