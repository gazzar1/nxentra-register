# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "2258d6303a3672a381fe7606c2d2917b"
name = "Nxentra Sync"
application_url = "https://app.nxentra.com"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_shopify_payments_accounts added 2026-06-10: the GraphQL
# shopifyPaymentsAccount field (payout + balance-transaction sync) requires
# it — the legacy REST payouts endpoint only needed _payouts. Verified via
# live ACCESS_DENIED from shopify_graphql_ping on 2026-04.
# read_all_orders added 2026-06-19 (A126): read_orders alone only exposes the
# last 60 days; read_all_orders (Shopify-approved, ticket 67968450) lifts that
# so historical imports can reach back years. Requires `shopify app deploy`
# AND each existing store to reconnect before the grant takes effect — the
# import code is scope-gated (ShopifyStore.scopes) so un-reconnected stores
# keep the safe 60-day clamp and never 403.
scopes = "read_customers,read_discounts,read_fulfillments,read_inventory,read_locations,read_orders,read_all_orders,read_products,read_returns,read_shopify_payments_accounts,read_shopify_payments_payouts"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://app.nxentra.com/api/shopify/callback/" ]

[webhooks]
api_version = "2026-04"

# A44: Shopify-mandatory GDPR compliance webhooks. All three point at the
# same endpoint; our router branches on the X-Shopify-Topic header.
[webhooks.privacy_compliance]
customer_data_request_url = "https://app.nxentra.com/api/shopify/webhooks/"
customer_deletion_url     = "https://app.nxentra.com/api/shopify/webhooks/"
shop_deletion_url         = "https://app.nxentra.com/api/shopify/webhooks/"

# A51 (2026-05-15): declarative webhook subscriptions. Replaces the broken
# programmatic POST to /admin/api/.../webhooks.json which required a
# `write_webhooks` scope we don't grant. Declarative subscriptions are
# registered by Shopify on `shopify app deploy` — no scope needed, no
# per-store registration call. Router in views.py branches on X-Shopify-Topic.
#
# Subscription set deliberately narrow (2026-05-17): topics that carry
# customer PII (orders/*, refunds/create, fulfillments/create) need Level 1
# Protected Customer Data approval before they can be declared — see A53.
# Disputes topics (disputes/create, disputes/update) need the
# `read_shopify_payments_disputes` scope we haven't requested — see A54.
# Periodic `sync_shopify_all` Celery task (every 4h) covers the order/refund/
# fulfillment gap until A53/A54 land.
# 2026-06-11: order/refund/fulfillment topics added once the PCD Level 1
# data-use request was completed in the Partner Dashboard (these topics
# carry customer PII and can't be declared without it). They make orders
# appear in Nxentra instantly via webhook instead of the Re-sync button /
# 4-hour catch-up, and fulfillments/create books COGS. Disputes topics
# still excluded — they need the read_shopify_payments_disputes scope we
# don't request (A54).
[[webhooks.subscriptions]]
uri = "https://app.nxentra.com/api/shopify/webhooks/"
topics = [
  "products/create",
  "products/update",
  "app/uninstalled",
  "orders/create",
  "orders/paid",
  "orders/cancelled",
  "refunds/create",
  "fulfillments/create",
]
